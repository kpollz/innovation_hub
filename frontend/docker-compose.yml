version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Use relative path so nginx proxy handles the API calls
        - VITE_API_URL=/api/v1
    container_name: innovation_hub_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped
    networks:
      - innovation_hub_network
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"

# Connect to backend network
networks:
  innovation_hub_network:
    external: true

# If you want to run both frontend and backend together, use this instead:
# networks:
#   innovation_hub_network:
#     driver: bridge