version: '3.8'

services:
  # Database
  db:
    image: postgres:16-alpine
    container_name: innovation_hub_db
    environment:
      POSTGRES_USER: ${DB_USER:-innovation_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-innovation_pass}
      POSTGRES_DB: ${DB_NAME:-innovation_hub}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./backend/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-innovation_user} -d ${DB_NAME:-innovation_hub}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - innovation_hub_network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: innovation_hub_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./backend/minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - innovation_hub_network

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: innovation_hub_api
    restart: always
    working_dir: /app
    env_file:
      - ./backend/.env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - ./backend/app:/app/app:ro
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "poetry run alembic upgrade head && poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - innovation_hub_network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api/v1
    container_name: innovation_hub_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - api
    networks:
      - innovation_hub_network

networks:
  innovation_hub_network:
    driver: bridge